<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Master IA — Programa de Formación</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #6c8ef7;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --success: #34d399;
      --warning: #fbbf24;
      --code-bg: #131722;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 20px 18px 14px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    #sidebar-header p {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 3px;
    }

    #progress-bar-wrap {
      padding: 10px 18px 0;
    }

    #progress-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    #progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 9px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 9px;
      transition: width 0.5s ease;
    }

    #nav {
      overflow-y: auto;
      flex: 1;
      padding: 12px 0 20px;
    }

    .bloque-titulo {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      padding: 14px 18px 6px;
    }

    .modulo-titulo {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      padding: 8px 18px 4px;
      opacity: 0.85;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 18px 7px 28px;
      font-size: 0.8rem;
      color: var(--text-muted);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.15s;
      text-decoration: none;
    }

    .nav-item:hover {
      background: var(--surface2);
      color: var(--text);
      border-left-color: var(--border);
    }

    .nav-item.active {
      background: var(--surface2);
      color: var(--accent);
      border-left-color: var(--accent);
      font-weight: 600;
    }

    .nav-item.done .dot { background: var(--success); }
    .nav-item.in-progress .dot { background: var(--warning); }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── MAIN ────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topbar {
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #breadcrumb {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    #breadcrumb span { color: var(--text); font-weight: 600; }

    .tag {
      font-size: 0.65rem;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tag-teoria   { background: #1e3a5f; color: #60a5fa; }
    .tag-lab      { background: #1a3a2a; color: #34d399; }
    .tag-caso     { background: #3a2a1a; color: #fbbf24; }

    #content-area {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px 60px;
    }

    #tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab-btn {
      padding: 8px 16px;
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.83rem;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
      font-family: inherit;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

    /* ── MARKDOWN RENDER ──────────────────────── */
    .md-body { max-width: 820px; }

    .md-body h1 { font-size: 1.6rem; color: var(--accent); margin-bottom: 20px; }
    .md-body h2 { font-size: 1.15rem; color: var(--accent2); margin: 28px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .md-body h3 { font-size: 0.95rem; color: var(--text); margin: 20px 0 8px; }
    .md-body p  { line-height: 1.75; color: var(--text); margin-bottom: 14px; font-size: 0.9rem; }
    .md-body ul, .md-body ol { padding-left: 20px; margin-bottom: 14px; }
    .md-body li { line-height: 1.7; font-size: 0.9rem; color: var(--text); margin-bottom: 4px; }
    .md-body strong { color: #fff; }
    .md-body em { color: var(--accent2); }

    .md-body code {
      background: var(--code-bg);
      color: #a5f3fc;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.82rem;
    }

    .md-body pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      overflow-x: auto;
      margin: 16px 0;
    }

    .md-body pre code {
      background: none;
      padding: 0;
      color: #e2e8f0;
      font-size: 0.83rem;
      line-height: 1.65;
    }

    .md-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
      font-size: 0.85rem;
    }

    .md-body th {
      background: var(--surface2);
      color: var(--accent);
      padding: 10px 14px;
      text-align: left;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .md-body td {
      padding: 9px 14px;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .md-body tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    .md-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      background: var(--surface2);
      border-radius: 0 6px 6px 0;
      margin: 16px 0;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── HOME CARD ───────────────────────────── */
    #home {
      max-width: 820px;
    }

    .hero {
      background: linear-gradient(135deg, var(--surface2) 0%, #1a1f35 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 40px;
      margin-bottom: 28px;
    }

    .hero h2 {
      font-size: 1.5rem;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      text-align: center;
    }

    .stat-card .num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    .stat-card .lbl { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .module-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .module-card:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateY(-2px);
    }

    .module-card .num { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; }
    .module-card .name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .module-card .status { font-size: 0.7rem; color: var(--success); margin-top: 6px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div id="sidebar-header">
    <h1>⚡ Master IA</h1>
    <p>Programa de Formación Autodidacta</p>
  </div>
  <div id="progress-bar-wrap">
    <div id="progress-label">
      <span>Progreso general</span>
      <span id="progress-pct">0%</span>
    </div>
    <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
  </div>
  <div id="nav">
    <!-- Generado por JS -->
  </div>
</nav>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div id="breadcrumb">Master IA &rsaquo; <span id="bc-current">Inicio</span></div>
    <div id="tag-area"></div>
  </div>
  <div id="content-area">
    <!-- Home por defecto -->
    <div id="home">
      <div class="hero">
        <h2>Master en IA Aplicada y Optimización</h2>
        <p>Programa técnico de formación autodidacta con laboratorios ejecutables, teoría profunda y casos de uso reales aplicados a alta gestión y operaciones empresariales.</p>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="module-grid" id="module-grid"></div>
    </div>
    <!-- Contenido dinámico de módulos -->
    <div id="lesson-view" style="display:none;">
      <div id="tabs">
        <button class="tab-btn active" onclick="switchTab('teoria')">Teoría</button>
        <button class="tab-btn" onclick="switchTab('lab')">Laboratorio</button>
        <button class="tab-btn" onclick="switchTab('caso')">Caso de Uso</button>
      </div>
      <div id="tab-teoria" class="md-body"></div>
      <div id="tab-lab"    class="md-body" style="display:none;"></div>
      <div id="tab-caso"   class="md-body" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
// ─── CURRÍCULO ────────────────────────────────────────────────────────────────
// Añadir aquí cada sección cuando se genere su contenido.
// status: 'done' | 'in-progress' | 'pending'

const CURRICULUM = [
  {
    bloque: "Bloque A — Fundamentos y Arquitectura Empresarial",
    modulos: [
      {
        titulo: "Módulo 1: Fundamentos de IA, Estrategia y Casos de Negocio",
        secciones: [
          {
            id: "1.1",
            titulo: "1.1 Panorama de la IA",
            status: "done",
            path: "./content/bloque_a/modulo_1/1.1_panorama_ia/README.md",
            lab:   "./content/bloque_a/modulo_1/1.1_panorama_ia/lab.py",
            caso:  null
          },
          { id: "1.2", titulo: "1.2 IA como Palanca Estratégica",       status: "pending", path: null, lab: null, caso: null },
          { id: "1.3", titulo: "1.3 Construcción del Caso de Negocio",   status: "pending", path: null, lab: null, caso: null },
        ]
      },
      {
        titulo: "Módulo 2: Ecosistema LLM y Prompt Engineering Avanzado",
        secciones: [
          { id: "2.1", titulo: "2.1 Arquitectura Conceptual de los LLMs", status: "pending", path: null, lab: null, caso: null },
          { id: "2.2", titulo: "2.2 Prompt Engineering de Producción",    status: "pending", path: null, lab: null, caso: null },
          { id: "2.3", titulo: "2.3 Selección Estratégica de Modelos",    status: "pending", path: null, lab: null, caso: null },
        ]
      },
      {
        titulo: "Módulo 3: Outputs Profesionales y Estandarización",
        secciones: [
          { id: "3.1", titulo: "3.1 Ingeniería de Outputs Corporativos",  status: "pending", path: null, lab: null, caso: null },
          { id: "3.2", titulo: "3.2 Identidad Comunicativa y Tono",       status: "pending", path: null, lab: null, caso: null },
          { id: "3.3", titulo: "3.3 Validación y Quality Assurance",      status: "pending", path: null, lab: null, caso: null },
        ]
      },
      {
        titulo: "Módulo 4: Asistentes Corporativos y Arquitectura RAG",
        secciones: [
          { id: "4.1", titulo: "4.1 Fundamentos de RAG",                  status: "pending", path: null, lab: null, caso: null },
          { id: "4.2", titulo: "4.2 Curación de Bases Documentales",      status: "pending", path: null, lab: null, caso: null },
          { id: "4.3", titulo: "4.3 Diseño de Asistentes Seguros",        status: "pending", path: null, lab: null, caso: null },
        ]
      },
      {
        titulo: "Módulo 5: Analítica de Datos Asistida",
        secciones: [
          { id: "5.1", titulo: "5.1 Preparación de Datos",                status: "pending", path: null, lab: null, caso: null },
          { id: "5.2", titulo: "5.2 Interrogación Analítica con IA",      status: "pending", path: null, lab: null, caso: null },
          { id: "5.3", titulo: "5.3 Integración con Business Intelligence",status: "pending", path: null, lab: null, caso: null },
        ]
      },
      {
        titulo: "Módulo 6: Automatización No-Code y Orquestación",
        secciones: [
          { id: "6.1", titulo: "6.1 Fundamentos No-Code",                 status: "pending", path: null, lab: null, caso: null },
          { id: "6.2", titulo: "6.2 IA como Motor de Decisión",           status: "pending", path: null, lab: null, caso: null },
          { id: "6.3", titulo: "6.3 Monitoreo y Resiliencia",             status: "pending", path: null, lab: null, caso: null },
        ]
      },
      {
        titulo: "Módulo 7: Agentes Departamentales y Flujos Autónomos",
        secciones: [
          { id: "7.1", titulo: "7.1 Anatomía de un Agente",               status: "pending", path: null, lab: null, caso: null },
          { id: "7.2", titulo: "7.2 Tool-Calling y Herramientas",         status: "pending", path: null, lab: null, caso: null },
          { id: "7.3", titulo: "7.3 Permisología y HITL",                 status: "pending", path: null, lab: null, caso: null },
        ]
      },
      {
        titulo: "Módulo 8: Multimodalidad Avanzada",
        secciones: [
          { id: "8.1", titulo: "8.1 Visión por IA",                       status: "pending", path: null, lab: null, caso: null },
          { id: "8.2", titulo: "8.2 Audio: transcripción y actas",        status: "pending", path: null, lab: null, caso: null },
          { id: "8.3", titulo: "8.3 Pipelines multimodales",              status: "pending", path: null, lab: null, caso: null },
        ]
      },
      {
        titulo: "Módulo 9: Implementación, Gobernanza y Cambio",
        secciones: [
          { id: "9.1", titulo: "9.1 AI Act europeo y GDPR",               status: "pending", path: null, lab: null, caso: null },
          { id: "9.2", titulo: "9.2 Políticas de IA Generativa",          status: "pending", path: null, lab: null, caso: null },
          { id: "9.3", titulo: "9.3 Fricción tecnológica y adopción",     status: "pending", path: null, lab: null, caso: null },
        ]
      },
    ]
  },
  {
    bloque: "Bloque B — Tracks de Especialización",
    modulos: [
      { titulo: "Track 1: Productividad y Organización", secciones: [
        { id:"T1.1", titulo:"10.1 Mapa de jornada optimizable", status:"pending", path:null, lab:null, caso:null },
      ]},
      { titulo: "Track 2: Marketing y Contenido", secciones: [
        { id:"T2.1", titulo:"11.1 Estrategia de contenidos", status:"pending", path:null, lab:null, caso:null },
      ]},
      { titulo: "Track 3: Carrera Profesional", secciones: [
        { id:"T3.1", titulo:"12.1 Mejora de empleabilidad", status:"pending", path:null, lab:null, caso:null },
      ]},
      { titulo: "Track 4: Análisis Financiero", secciones: [
        { id:"T4.1", titulo:"13.1 Research de industria", status:"pending", path:null, lab:null, caso:null },
      ]},
      { titulo: "Track 5: Emprendimiento y Producto", secciones: [
        { id:"T5.1", titulo:"14.1 Validación de ideas", status:"pending", path:null, lab:null, caso:null },
      ]},
    ]
  }
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentTab = 'teoria';
let currentSection = null;
const cache = {};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function allSections() {
  return CURRICULUM.flatMap(b => b.modulos.flatMap(m => m.secciones));
}

function calcProgress() {
  const all  = allSections();
  const done = all.filter(s => s.status === 'done').length;
  return Math.round((done / all.length) * 100);
}

async function fetchText(path) {
  if (!path) return null;
  if (cache[path]) return cache[path];
  try {
    const r = await fetch(path);
    if (!r.ok) return null;
    const t = await r.text();
    cache[path] = t;
    return t;
  } catch { return null; }
}

function wrapCode(code, lang = 'python') {
  return `\`\`\`${lang}\n${code}\n\`\`\``;
}

// ─── RENDER NAV ───────────────────────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';

  // Home
  const home = document.createElement('div');
  home.className = 'nav-item active';
  home.id = 'nav-home';
  home.innerHTML = '<span class="dot" style="background:var(--accent)"></span> Inicio';
  home.onclick = () => showHome();
  nav.appendChild(home);

  CURRICULUM.forEach(bloque => {
    const bTitle = document.createElement('div');
    bTitle.className = 'bloque-titulo';
    bTitle.textContent = bloque.bloque;
    nav.appendChild(bTitle);

    bloque.modulos.forEach(modulo => {
      const mTitle = document.createElement('div');
      mTitle.className = 'modulo-titulo';
      mTitle.textContent = modulo.titulo;
      nav.appendChild(mTitle);

      modulo.secciones.forEach(sec => {
        const el = document.createElement('div');
        el.className = `nav-item ${sec.status}`;
        el.id = `nav-${sec.id}`;
        el.innerHTML = `<span class="dot"></span>${sec.titulo}`;
        if (sec.status !== 'pending') {
          el.onclick = () => openSection(sec);
        } else {
          el.style.opacity = '0.4';
          el.style.cursor = 'default';
        }
        nav.appendChild(el);
      });
    });
  });
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function showHome() {
  document.getElementById('home').style.display = '';
  document.getElementById('lesson-view').style.display = 'none';
  document.getElementById('bc-current').textContent = 'Inicio';
  document.getElementById('tag-area').innerHTML = '';

  // Update active nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-home').classList.add('active');

  // Stats
  const all   = allSections();
  const done  = all.filter(s => s.status === 'done').length;
  const wip   = all.filter(s => s.status === 'in-progress').length;
  const pct   = calcProgress();

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="num">${all.length}</div><div class="lbl">Lecciones totales</div></div>
    <div class="stat-card"><div class="num" style="color:var(--success)">${done}</div><div class="lbl">Completadas</div></div>
    <div class="stat-card"><div class="num" style="color:var(--warning)">${wip}</div><div class="lbl">En progreso</div></div>
    <div class="stat-card"><div class="num">${pct}%</div><div class="lbl">Avance</div></div>
  `;

  // Module cards — only available ones
  const available = all.filter(s => s.status !== 'pending');
  document.getElementById('module-grid').innerHTML = available.length
    ? available.map(s => `
        <div class="module-card" onclick="openSection(${JSON.stringify(s).replace(/"/g,'&quot;')})">
          <div class="num">${s.id}</div>
          <div class="name">${s.titulo}</div>
          <div class="status">✓ Disponible</div>
        </div>`).join('')
    : '<p style="color:var(--text-muted);font-size:0.85rem">Las lecciones se irán añadiendo módulo a módulo.</p>';
}

// ─── OPEN SECTION ─────────────────────────────────────────────────────────────
async function openSection(sec) {
  currentSection = sec;
  document.getElementById('home').style.display = 'none';
  document.getElementById('lesson-view').style.display = '';
  document.getElementById('bc-current').textContent = sec.titulo;

  // Active nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${sec.id}`);
  if (navEl) navEl.classList.add('active');

  // Tags
  document.getElementById('tag-area').innerHTML = `
    <span class="tag tag-teoria">Teoría</span>
    ${sec.lab  ? '<span class="tag tag-lab">Lab</span>'  : ''}
    ${sec.caso ? '<span class="tag tag-caso">Caso</span>' : ''}
  `;

  // Load & render
  switchTab('teoria');
  await renderTab('teoria', sec);
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
async function switchTab(tab) {
  currentTab = tab;
  ['teoria','lab','caso'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      const tabs = ['teoria','lab','caso'];
      btn.classList.toggle('active', tabs[i] === tab);
    });
  });
  if (currentSection) await renderTab(tab, currentSection);
}

async function renderTab(tab, sec) {
  const el = document.getElementById(`tab-${tab}`);
  if (tab === 'teoria') {
    if (!sec.path) { el.innerHTML = '<p style="color:var(--text-muted)">Próximamente.</p>'; return; }
    const md = await fetchText(sec.path);
    el.innerHTML = md ? marked.parse(md) : '<p style="color:var(--text-muted)">No disponible.</p>';
  } else if (tab === 'lab') {
    if (!sec.lab) { el.innerHTML = '<p style="color:var(--text-muted)">Laboratorio no disponible aún.</p>'; return; }
    const code = await fetchText(sec.lab);
    el.innerHTML = code ? marked.parse(wrapCode(code)) : '<p style="color:var(--text-muted)">No disponible.</p>';
  } else if (tab === 'caso') {
    if (!sec.caso) { el.innerHTML = '<p style="color:var(--text-muted)">Caso de uso no disponible aún.</p>'; return; }
    const md = await fetchText(sec.caso);
    el.innerHTML = md ? marked.parse(md) : '<p style="color:var(--text-muted)">No disponible.</p>';
  }
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────────────────
function updateProgress() {
  const pct = calcProgress();
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '%';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderNav();
updateProgress();
showHome();
</script>
</body>
</html>
