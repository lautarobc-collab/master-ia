<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Master IA — Programa de Formación</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════════════
       DESIGN SYSTEM — Master IA
       Paleta: Warm Neutral (papel de calidad, fácil lectura)
       Tipografía: System UI — familiar, sin fricción
       Filosofía: alto contraste REAL, sin colores que compitan
    ═══════════════════════════════════════════════════ */
    :root {
      /* Fondos */
      --bg:        #F7F6F2;   /* crema muy suave — no agota */
      --surface:   #FFFFFF;   /* cards y paneles */
      --surface2:  #F0EEE9;   /* hover, filas alternas */
      --sidebar-bg:#1F2235;   /* sidebar oscuro — separa visualmente */

      /* Bordes */
      --border:    #E2DED6;
      --border-sidebar: #2D3150;

      /* Texto — CONTRASTE WCAG AA garantizado */
      --text:          #1A1A2E;   /* casi negro — máxima legibilidad */
      --text-secondary:#4A5568;   /* secundario — visible, no molesta */
      --text-muted:    #718096;   /* placeholders, labels */
      --text-sidebar:  #CDD0E0;   /* texto en sidebar oscuro */
      --text-sidebar-muted: #6B7280;

      /* Acento principal — azul profundo */
      --accent:    #2563EB;
      --accent-bg: #EFF4FF;   /* fondo suave para badges/callouts */
      --accent-border: #BFCFFF;

      /* Estados */
      --success:     #059669;
      --success-bg:  #ECFDF5;
      --warning:     #D97706;
      --warning-bg:  #FFFBEB;
      --pending:     #9CA3AF;

      /* Código */
      --code-inline-bg:   #EEF0F5;
      --code-inline-text: #2563EB;
      --code-block-bg:    #1E2235;
      --code-block-text:  #E2E8F4;

      --radius-sm: 6px;
      --radius:    10px;
      --radius-lg: 14px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow:    0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);
    }

    /* ── RESET ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SCROLLBAR ───────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #C4BFB7; }

    /* ═══════════════════════════════════════════
       SIDEBAR — fondo oscuro para contraste visual
    ═══════════════════════════════════════════ */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-sidebar);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 22px 18px 16px;
      border-bottom: 1px solid var(--border-sidebar);
    }

    #sidebar-header h1 {
      font-size: 1rem;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.02em;
    }

    #sidebar-header p {
      font-size: 0.73rem;
      color: var(--text-sidebar-muted);
      margin-top: 3px;
    }

    /* Barra de progreso */
    #progress-bar-wrap { padding: 14px 18px 4px; }

    #progress-label {
      font-size: 0.7rem;
      color: var(--text-sidebar-muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    #progress-label span:last-child { color: var(--text-sidebar); font-weight: 600; }

    #progress-bar {
      height: 5px;
      background: #2D3150;
      border-radius: 99px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3B82F6, #818CF8);
      border-radius: 99px;
      transition: width 0.6s ease;
    }

    /* Navegación */
    #nav {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0 24px;
    }

    .bloque-titulo {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #4B5280;
      padding: 18px 18px 6px;
    }

    .modulo-titulo {
      font-size: 0.75rem;
      font-weight: 600;
      color: #8892B0;
      padding: 10px 18px 4px;
      line-height: 1.4;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 16px 7px 30px;
      font-size: 0.79rem;
      color: var(--text-sidebar-muted);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      user-select: none;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text-sidebar);
    }

    .nav-item.active {
      background: rgba(59,130,246,0.15);
      color: #93C5FD;
      border-left-color: #3B82F6;
      font-weight: 600;
    }

    .nav-item.pending { opacity: 0.38; cursor: default; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #3B4268;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .nav-item.done .dot       { background: #34D399; }
    .nav-item.in-progress .dot { background: #FBBF24; }
    .nav-item.active .dot     { background: #93C5FD; }

    /* ═══════════════════════════════════════════
       MAIN CONTENT
    ═══════════════════════════════════════════ */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* Topbar */
    #topbar {
      padding: 13px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: var(--shadow-sm);
    }

    #breadcrumb {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    #breadcrumb span {
      color: var(--text);
      font-weight: 600;
    }

    /* Tags */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.68rem;
      padding: 3px 9px;
      border-radius: 99px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 1px solid transparent;
    }

    .tag-teoria { background: #EFF4FF; color: #1D4ED8; border-color: #BFCFFF; }
    .tag-lab    { background: #ECFDF5; color: #065F46; border-color: #A7F3D0; }
    .tag-caso   { background: #FFFBEB; color: #92400E; border-color: #FDE68A; }

    #tag-area { display: flex; gap: 6px; flex-wrap: wrap; }

    /* Área de contenido */
    #content-area {
      flex: 1;
      overflow-y: auto;
      padding: 36px 44px 72px;
    }

    /* Tabs */
    #tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 32px;
      border-bottom: 2px solid var(--border);
    }

    .tab-btn {
      padding: 9px 20px;
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 700;
    }

    /* ═══════════════════════════════════════════
       MARKDOWN — sistema tipográfico completo
       Todos los colores son sobre fondo blanco/crema
    ═══════════════════════════════════════════ */
    .md-body { max-width: 780px; }

    .md-body h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    .md-body h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      margin: 36px 0 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }

    .md-body h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin: 24px 0 8px;
    }

    .md-body h4 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin: 16px 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .md-body p {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .md-body ul, .md-body ol {
      padding-left: 22px;
      margin-bottom: 16px;
    }

    .md-body li {
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }

    /* strong y em — sobre fondo claro */
    .md-body strong {
      font-weight: 700;
      color: var(--text);          /* NEGRO, nunca blanco */
    }

    .md-body em {
      font-style: italic;
      color: var(--text-secondary);
    }

    /* Código inline */
    .md-body :not(pre) > code {
      background: var(--code-inline-bg);
      color: var(--code-inline-text);
      padding: 2px 7px;
      border-radius: var(--radius-sm);
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.83rem;
      font-weight: 500;
      border: 1px solid #D8DCF0;
    }

    /* Bloque de código — dark para máxima legibilidad de código */
    .md-body pre {
      background: var(--code-block-bg);
      border-radius: var(--radius);
      padding: 20px 22px;
      overflow-x: auto;
      margin: 20px 0;
      box-shadow: var(--shadow-sm);
    }

    .md-body pre code {
      background: none;
      padding: 0;
      border: none;
      color: var(--code-block-text);
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
    }

    /* Tablas */
    .md-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 20px 0;
      font-size: 0.88rem;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .md-body thead tr {
      background: var(--accent-bg);
    }

    .md-body th {
      color: var(--accent);
      padding: 11px 16px;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-bottom: 2px solid var(--accent-border);
    }

    .md-body td {
      padding: 10px 16px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .md-body tr:last-child td { border-bottom: none; }
    .md-body tbody tr:nth-child(even) td { background: var(--surface2); }
    .md-body tbody tr:hover td { background: #ECF0FE; }

    /* Blockquote */
    .md-body blockquote {
      border-left: 4px solid var(--accent);
      padding: 12px 18px;
      background: var(--accent-bg);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin: 20px 0;
      color: var(--text-secondary);
    }

    .md-body blockquote p { margin: 0; }

    /* Línea horizontal */
    .md-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* ═══════════════════════════════════════════
       HOME — página de inicio
    ═══════════════════════════════════════════ */
    #home { max-width: 860px; }

    .hero {
      background: linear-gradient(135deg, #EFF4FF 0%, #F5F3FF 100%);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-lg);
      padding: 36px 44px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-sm);
    }

    .hero h2 {
      font-size: 1.55rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .hero p {
      font-size: 0.93rem;
      color: var(--text-secondary);
      line-height: 1.75;
      max-width: 600px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.15s, transform 0.15s;
    }

    .stat-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }

    .stat-card .num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-card .lbl {
      font-size: 0.73rem;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 500;
    }

    /* Module cards */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    .module-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      box-shadow: var(--shadow-sm);
    }

    .module-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg), var(--shadow);
      transform: translateY(-2px);
    }

    .module-card .num {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .module-card .name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    .module-card .status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.71rem;
      font-weight: 600;
      color: var(--success);
      margin-top: 10px;
      background: var(--success-bg);
      padding: 2px 8px;
      border-radius: 99px;
    }

    /* Texto de sección vacía */
    .empty-msg {
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 20px 0;
    }
  </style>
</head>

        { id:"T1.1", titulo:"10.1 Mapa de jornada optimizable", status:"pending", path:null, lab:null, caso:null },
      ]},
      { titulo: "Track 2: Marketing y Contenido", secciones: [
        { id:"T2.1", titulo:"11.1 Estrategia de contenidos", status:"pending", path:null, lab:null, caso:null },
      ]},
      { titulo: "Track 3: Carrera Profesional", secciones: [
        { id:"T3.1", titulo:"12.1 Mejora de empleabilidad", status:"pending", path:null, lab:null, caso:null },
      ]},
      { titulo: "Track 4: Análisis Financiero", secciones: [
        { id:"T4.1", titulo:"13.1 Research de industria", status:"pending", path:null, lab:null, caso:null },
      ]},
      { titulo: "Track 5: Emprendimiento y Producto", secciones: [
        { id:"T5.1", titulo:"14.1 Validación de ideas", status:"pending", path:null, lab:null, caso:null },
      ]},
    ]
  }
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentTab = 'teoria';
let currentSection = null;
const cache = {};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function allSections() {
  return CURRICULUM.flatMap(b => b.modulos.flatMap(m => m.secciones));
}

function calcProgress() {
  const all  = allSections();
  const done = all.filter(s => s.status === 'done').length;
  return Math.round((done / all.length) * 100);
}

async function fetchText(path) {
  if (!path) return null;
  if (cache[path]) return cache[path];
  try {
    const r = await fetch(path);
    if (!r.ok) return null;
    const t = await r.text();
    cache[path] = t;
    return t;
  } catch { return null; }
}

function wrapCode(code, lang = 'python') {
  return `\`\`\`${lang}\n${code}\n\`\`\``;
}

// ─── RENDER NAV ───────────────────────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';

  // Home
  const home = document.createElement('div');
  home.className = 'nav-item active';
  home.id = 'nav-home';
  home.innerHTML = '<span class="dot" style="background:var(--accent)"></span> Inicio';
  home.onclick = () => showHome();
  nav.appendChild(home);

  CURRICULUM.forEach(bloque => {
    const bTitle = document.createElement('div');
    bTitle.className = 'bloque-titulo';
    bTitle.textContent = bloque.bloque;
    nav.appendChild(bTitle);

    bloque.modulos.forEach(modulo => {
      const mTitle = document.createElement('div');
      mTitle.className = 'modulo-titulo';
      mTitle.textContent = modulo.titulo;
      nav.appendChild(mTitle);

      modulo.secciones.forEach(sec => {
        const el = document.createElement('div');
        el.className = `nav-item ${sec.status}`;
        el.id = `nav-${sec.id}`;
        el.innerHTML = `<span class="dot"></span>${sec.titulo}`;
        if (sec.status !== 'pending') {
          el.onclick = () => openSection(sec);
        } else {
          el.style.opacity = '0.4';
          el.style.cursor = 'default';
        }
        nav.appendChild(el);
      });
    });
  });
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function showHome() {
  document.getElementById('home').style.display = '';
  document.getElementById('lesson-view').style.display = 'none';
  document.getElementById('bc-current').textContent = 'Inicio';
  document.getElementById('tag-area').innerHTML = '';

  // Update active nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-home').classList.add('active');

  // Stats
  const all   = allSections();
  const done  = all.filter(s => s.status === 'done').length;
  const wip   = all.filter(s => s.status === 'in-progress').length;
  const pct   = calcProgress();

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="num">${all.length}</div><div class="lbl">Lecciones totales</div></div>
    <div class="stat-card"><div class="num" style="color:var(--success)">${done}</div><div class="lbl">Completadas</div></div>
    <div class="stat-card"><div class="num" style="color:var(--warning)">${wip}</div><div class="lbl">En progreso</div></div>
    <div class="stat-card"><div class="num" style="color:var(--accent)">${pct}%</div><div class="lbl">Avance total</div></div>
  `;

  // Module cards — only available ones
  const available = all.filter(s => s.status !== 'pending');
  document.getElementById('module-grid').innerHTML = available.length
    ? available.map(s => `
        <div class="module-card" onclick="openSection(${JSON.stringify(s).replace(/"/g,'&quot;')})">
          <div class="num">${s.id}</div>
          <div class="name">${s.titulo}</div>
          <div class="status">✓ Disponible</div>

        </div>`).join('')
    : '<p class="empty-msg">Las lecciones se irán añadiendo módulo a módulo.</p>';
}

// ─── OPEN SECTION ─────────────────────────────────────────────────────────────
async function openSection(sec) {
  currentSection = sec;
  document.getElementById('home').style.display = 'none';
  document.getElementById('lesson-view').style.display = '';
  document.getElementById('bc-current').textContent = sec.titulo;

  // Active nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${sec.id}`);
  if (navEl) navEl.classList.add('active');

  // Tags
  document.getElementById('tag-area').innerHTML = `
    <span class="tag tag-teoria">Teoría</span>
    ${sec.lab  ? '<span class="tag tag-lab">Lab</span>'  : ''}
    ${sec.caso ? '<span class="tag tag-caso">Caso</span>' : ''}
  `;

  // Load & render
  switchTab('teoria');
  await renderTab('teoria', sec);
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
async function switchTab(tab) {
  currentTab = tab;
  ['teoria','lab','caso'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      const tabs = ['teoria','lab','caso'];
      btn.classList.toggle('active', tabs[i] === tab);
    });
  });
  if (currentSection) await renderTab(tab, currentSection);
}

async function renderTab(tab, sec) {
  const el = document.getElementById(`tab-${tab}`);
  if (tab === 'teoria') {
    if (!sec.path) { el.innerHTML = '<p style="color:var(--text-muted)">Próximamente.</p>'; return; }
    const md = await fetchText(sec.path);
    el.innerHTML = md ? marked.parse(md) : '<p style="color:var(--text-muted)">No disponible.</p>';
  } else if (tab === 'lab') {
    if (!sec.lab) { el.innerHTML = '<p style="color:var(--text-muted)">Laboratorio no disponible aún.</p>'; return; }
    const code = await fetchText(sec.lab);
    el.innerHTML = code ? marked.parse(wrapCode(code)) : '<p style="color:var(--text-muted)">No disponible.</p>';
  } else if (tab === 'caso') {
    if (!sec.caso) { el.innerHTML = '<p style="color:var(--text-muted)">Caso de uso no disponible aún.</p>'; return; }
    const md = await fetchText(sec.caso);
    el.innerHTML = md ? marked.parse(md) : '<p style="color:var(--text-muted)">No disponible.</p>';
  }
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────────────────
function updateProgress() {
  const pct = calcProgress();
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '%';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderNav();
updateProgress();
showHome();
</script>
</body>
</html>
